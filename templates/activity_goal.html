<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Activity & Goal</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/activity.css') }}">

</head>

<body>

<h1 class="title">Select Your Activity & Goal</h1>

<form method="POST">

<div class="page-layout">

<div class="main-container">

<!-- HEADER -->
<div class="header-row">
<h2>Activity Level <span style="color:red">*</span></h2>
<h2>Fitness Goal <span style="color:red">*</span></h2>
</div>

<!-- CONTENT -->
<div class="content-row">

<!-- LEFT: ACTIVITY -->
<div class="left-box">

<label>
<input type="radio" name="activity" value="sedentary"
{% if data and data.activity_level == "sedentary" %}checked{% endif %} required>
<b>Sedentary</b> – Little or no exercise
</label>

<label>
<input type="radio" name="activity" value="light"
{% if data and data.activity_level == "light" %}checked{% endif %}>
<b>Light</b> – Exercise 1-3 days/week
</label>

<label>
<input type="radio" name="activity" value="moderate"
{% if data and data.activity_level == "moderate" %}checked{% endif %}>
<b>Moderate</b> – Exercise 3-5 days/week
</label>

<label>
<input type="radio" name="activity" value="active"
{% if data and data.activity_level == "active" %}checked{% endif %}>
<b>Active</b> – Daily exercise
</label>

<label>
<input type="radio" name="activity" value="very_active"
{% if data and data.activity_level == "very_active" %}checked{% endif %}>
<b>Very Active</b> – Intense exercise / physical job
</label>

</div>

<!-- RIGHT: GOAL -->
<div class="right-box">

<label>
<input type="radio" name="goal" value="weight_loss"
{% if data and data.goal == "weight_loss" %}checked{% endif %} required>
<b>Weight Loss</b>
</label>

<label>
<input type="radio" name="goal" value="weight_gain"
{% if data and data.goal == "weight_gain" %}checked{% endif %}>
<b>Weight Gain</b>
</label>

<label>
<input type="radio" name="goal" value="muscle_build"
{% if data and data.goal == "muscle_build" %}checked{% endif %}>
<b>Muscle Build</b>
</label>

<label>
<input type="radio" name="goal" value="maintain"
{% if data and data.goal == "maintain" %}checked{% endif %}>
<b>Maintain Weight</b>
</label>

<!-- TARGET WEIGHT -->
<h3>🎯 Target Weight</h3>

<input type="number"
       name="target_weight"
       placeholder="Enter your target weight (kg)"
       min="20"
       max="300"
       step="0.1"
       value="{{ data.target_weight if data else '' }}"
       required>

</div>

</div>

</div>

</div>

<!-- BUTTONS -->
<a href="/body" class="nav-btn prev-btn">← Previous</a>

<button type="submit" class="nav-btn next-btn">
Save & Next →
</button>

</form>

</body>
</html>
